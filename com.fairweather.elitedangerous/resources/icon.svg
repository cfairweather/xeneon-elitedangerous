<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#08080a"/>
  <!-- Outer octagon frame -->
  <polygon points="32,2 50,10 62,28 62,36 50,54 32,62 14,54 2,36 2,28 14,10"
           fill="none" stroke="#f0820d" stroke-width="1" opacity="0.4"/>
  <!-- Diamond -->
  <polygon points="32,12 52,32 32,52 12,32"
           fill="none" stroke="#f0820d" stroke-width="1.5"/>
  <!-- Inner diamond -->
  <polygon points="32,22 42,32 32,42 22,32"
           fill="none" stroke="#f0820d" stroke-width="1" opacity="0.6"/>
  <!-- Cross hairs -->
  <line x1="12" y1="32" x2="22" y2="32" stroke="#f0820d" stroke-width="1" opacity="0.5"/>
  <line x1="42" y1="32" x2="52" y2="32" stroke="#f0820d" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="12" x2="32" y2="22" stroke="#f0820d" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="42" x2="32" y2="52" stroke="#f0820d" stroke-width="1" opacity="0.5"/>
  <!-- Center pip -->
  <circle cx="32" cy="32" r="4" fill="#f0820d"/>
  <circle cx="32" cy="32" r="2" fill="#ff9f30"/>
</svg>
